# ClawHub 技能配置
name: doubao-watermark-remover
slug: doubao-watermark-remover
version: 4.0.0
displayName: 豆包水印去除 v4.0 - FunASR 语音识别 + 网红字幕
description: 豆包 AI 视频水印去除工具 - 集成 FunASR 中文语音识别，自动生成网红字幕，一键处理
author: yun520-1
license: MIT
category: media-processing

# 技能入口文件
main: doubao_watermark_asr.py

# 依赖
dependencies:
  - funasr>=1.3.0
  - modelscope>=1.35.0
  - torch>=2.0.0
  - torchaudio>=2.0.0
  - opencv-python-headless>=4.8.0
  - numpy>=1.21.0
  - tqdm>=4.65.0
  - scikit-image>=0.21.0
  - pillow>=9.0.0
  - jieba>=0.42.0

# 系统要求
requirements:
  - Python 3.9+
  - FFmpeg 7.0+

# 标签
tags:
  - video
  - watermark
  - asr
  - subtitle
  - funasr
  - chinese
  - ai
  - doubao
  - image-processing
  - batch-processing

# 使用示例
examples:
  - "python3 doubao_watermark_asr.py video.mp4 -o ./output"
  - "python3 doubao_watermark_asr.py video.mp4 -o ./output --no-subtitle"
  - "python3 batch_final.py /input/dir /output/dir"

